# ============================================
# VERTRAGSMANAGER - PORTAINER GIT STACK
# ============================================
# Für Synology DS220+ mit Portainer
# Compose path: docker-compose.yml
# ============================================

version: '3.8'

services:
  # MongoDB Datenbank (4.4 für CPUs ohne AVX wie DS220+)
  mongo:
    image: mongo:4.4
    container_name: vertragsmanager-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - vertragsmanager-net
    # Warte 10 Sekunden bevor Backend startet
    command: mongod --bind_ip_all

  # Backend API (Python/FastAPI)
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: vertragsmanager-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=vertragsmanager
      - JWT_SECRET=${JWT_SECRET:-mein-super-geheimes-jwt-secret-32-zeichen}
    depends_on:
      - mongo
    networks:
      - vertragsmanager-net
    # Warte auf MongoDB
    command: >
      sh -c "sleep 5 && uvicorn server:app --host 0.0.0.0 --port 8001"

  # Frontend (Nginx + Web App)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: vertragsmanager-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - vertragsmanager-net

volumes:
  mongo_data:
    driver: local

networks:
  vertragsmanager-net:
    driver: bridge
