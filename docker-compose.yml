version: '3.8'

services:
  # MongoDB Datenbank (4.4 für CPUs ohne AVX wie DS220+)
  mongo:
    image: mongo:4.4
    container_name: vertragsmanager-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - vertragsmanager-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: vertragsmanager-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=vertragsmanager
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - vertragsmanager-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: vertragsmanager-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - vertragsmanager-net

volumes:
  mongo_data:

networks:
  vertragsmanager-net:
