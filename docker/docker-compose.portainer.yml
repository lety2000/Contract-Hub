# ============================================
# VERTRAGSMANAGER - PORTAINER STACK
# ============================================
# Vereinfachte Version für Synology NAS
# ============================================

version: '3.8'

services:
  # MongoDB Datenbank
  mongo:
    image: mongo:6
    container_name: vertragsmanager-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - vertragsmanager-net
    # Kein Healthcheck - verursacht Probleme auf Synology

  # Backend API (Python/FastAPI)
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: vertragsmanager-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=vertragsmanager
      - JWT_SECRET=${JWT_SECRET:-bitte-aendern-32-zeichen-minimum}
    depends_on:
      - mongo
    networks:
      - vertragsmanager-net

  # Frontend (Nginx + Web App)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: vertragsmanager-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - vertragsmanager-net

volumes:
  mongo_data:
    driver: local

networks:
  vertragsmanager-net:
    driver: bridge
